<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#0d1f14"/>
  <rect x="20" y="20" width="360" height="260" rx="8" fill="#0a2e1a" stroke="#4ecdc4" stroke-width="1" stroke-opacity="0.3"/>
  <!-- LiDAR device shape -->
  <rect x="115" y="85" width="170" height="90" rx="16" fill="#1a4a2e" stroke="#4ecdc4" stroke-width="2"/>
  <rect x="125" y="95" width="150" height="70" rx="10" fill="#0d3a20"/>
  <circle cx="200" cy="130" r="22" fill="#0a2e1a" stroke="#4ecdc4" stroke-width="1.5"/>
  <circle cx="200" cy="130" r="12" fill="#4ecdc4" fill-opacity="0.15" stroke="#4ecdc4" stroke-width="1"/>
  <circle cx="200" cy="130" r="4" fill="#4ecdc4"/>
  <!-- Scan lines -->
  <line x1="160" y1="130" x2="80" y2="80" stroke="#4ecdc4" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="4 3"/>
  <line x1="160" y1="130" x2="60" y2="130" stroke="#4ecdc4" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="4 3"/>
  <line x1="160" y1="130" x2="80" y2="180" stroke="#4ecdc4" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="4 3"/>
  <line x1="240" y1="130" x2="320" y2="80" stroke="#4ecdc4" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="4 3"/>
  <line x1="240" y1="130" x2="340" y2="130" stroke="#4ecdc4" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="4 3"/>
  <line x1="240" y1="130" x2="320" y2="180" stroke="#4ecdc4" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="4 3"/>
  <!-- Labels -->
  <text x="200" y="210" text-anchor="middle" fill="#4ecdc4" font-family="Inter, sans-serif" font-size="14" font-weight="700">Hummingbird HD1</text>
  <text x="200" y="230" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="Inter, sans-serif" font-size="11">Automotive Solid-State LiDAR</text>
  <text x="200" y="252" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="Inter, sans-serif" font-size="10">140° x 100° FOV | 0.1-50m | IP67/IP69</text>
</svg>