<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#0d1419"/>
  <rect x="20" y="20" width="360" height="260" rx="8" fill="#0a1e2e" stroke="#4ecdc4" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Compact LiDAR device shape -->
  <rect x="140" y="90" width="120" height="80" rx="12" fill="#1a2e4a" stroke="#4ecdc4" stroke-width="2"/>
  <rect x="150" y="100" width="100" height="60" rx="8" fill="#0d1f3a"/>
  <circle cx="200" cy="130" r="18" fill="#0a1e2e" stroke="#4ecdc4" stroke-width="1.5"/>
  <circle cx="200" cy="130" r="10" fill="#4ecdc4" fill-opacity="0.15" stroke="#4ecdc4" stroke-width="1"/>
  <circle cx="200" cy="130" r="3" fill="#4ecdc4"/>
  <!-- Scan lines -->
  <line x1="165" y1="130" x2="90" y2="85" stroke="#4ecdc4" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="4 3"/>
  <line x1="165" y1="130" x2="70" y2="130" stroke="#4ecdc4" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="4 3"/>
  <line x1="165" y1="130" x2="90" y2="175" stroke="#4ecdc4" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="4 3"/>
  <line x1="235" y1="130" x2="310" y2="85" stroke="#4ecdc4" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="4 3"/>
  <line x1="235" y1="130" x2="330" y2="130" stroke="#4ecdc4" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="4 3"/>
  <line x1="235" y1="130" x2="310" y2="175" stroke="#4ecdc4" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="4 3"/>
  <!-- Robot icon hint -->
  <rect x="185" y="68" width="30" height="16" rx="4" fill="#1a2e4a" stroke="#4ecdc4" stroke-width="0.8" stroke-opacity="0.5"/>
  <!-- Labels -->
  <text x="200" y="210" text-anchor="middle" fill="#4ecdc4" font-family="Inter, sans-serif" font-size="14" font-weight="700">Hummingbird HD1-R</text>
  <text x="200" y="230" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="Inter, sans-serif" font-size="11">Robotics Solid-State LiDAR</text>
  <text x="200" y="252" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="Inter, sans-serif" font-size="10">37x92x45mm | &lt;220g | 140° x 100° FOV</text>
</svg>