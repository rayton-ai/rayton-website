backend:
  name: git-gateway
  branch: main

# Where Decap CMS uploads files (PDFs, ZIPs, etc.)
media_folder: "static/files"
public_folder: "/static/files"

# Show publish workflow (draft / in-review / ready)
publish_mode: simple

locale: "ko"

collections:
  # ===== Downloads collection =====
  # Single JSON file that the Developer page reads.
  - name: "downloads"
    label: "다운로드 자료"
    label_singular: "자료"
    files:
      - name: "downloads_list"
        label: "전체 다운로드 자료 목록"
        file: "_data/downloads.json"
        format: "json"
        fields:
          - label: "자료 목록"
            name: "items"
            widget: "list"
            summary: "{{fields.title}} ({{fields.category}})"
            fields:
              - label: "제목"
                name: "title"
                widget: "string"
                hint: "예: Falcon K Datasheet v2.1"
              - label: "카테고리"
                name: "category"
                widget: "select"
                options:
                  - { label: "Datasheet (제품 사양서)", value: "datasheet" }
                  - { label: "User Manual / 설치 가이드",  value: "manual" }
                  - { label: "SDK / Firmware / 드라이버", value: "sdk" }
                  - { label: "Sample Data / Point Cloud", value: "sample" }
              - label: "제품명"
                name: "product"
                widget: "string"
                required: false
                hint: "예: Falcon K, Robin W, Robin E1X"
              - label: "버전"
                name: "version"
                widget: "string"
                required: false
                hint: "예: 2.1, 3.0.0"
              - label: "게시일"
                name: "date"
                widget: "date"
                required: false
                format: "YYYY-MM-DD"
              - label: "파일 크기"
                name: "size"
                widget: "string"
                required: false
                hint: "예: 2.3 MB, 120 MB"
              - label: "파일 업로드"
                name: "file"
                widget: "file"
                hint: "PDF, ZIP 등을 업로드하세요. 업로드하면 자동으로 URL이 저장됩니다."
              - label: "대외 공개 여부"
                name: "published"
                widget: "boolean"
                default: true
                required: false

  # ===== Form submissions (read-only view for admins) =====
  # Netlify captures form submissions automatically; this is just an info page.
