# ===== Rayton Website - Netlify configuration =====
# This file tells Netlify how to build & serve the site.
# Since the site is pure static HTML, no build command is needed.

[build]
  publish = "."
  command = ""

# Redirect admin path (optional but clean)
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

# Custom 404
# [[redirects]]
#   from = "/*"
#   to = "/404.html"
#   status = 404

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache the /static/files downloads (they rarely change)
[[headers]]
  for = "/static/files/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
